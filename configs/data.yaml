# TESS data download and dataset acquisition settings

download:
  mission: TESS
  quality: default
  cache_dir: data/raw
  max_targets_per_batch: 50
  download_timeout_sec: 120

# Sector selection: null = auto (prefer longest baseline)
sectors:
  prefer_all_available: true
  max_sectors: null

catalogs:
  nasa_exoplanet_archive:
    table: pscomppars
    mission_filter: TESS
    output_file: nasa_confirmed_planets.csv
  tess_ebs:
    source: vizier
    catalog_id: J/ApJS/258/16/tess-ebs
    output_file: tess_ebs_catalog.csv
  tess_rotation:
    source: vizier
    catalog_id: J/ApJS/259/62
    output_file: rotation_catalog.csv
  toi_false_positives:
    table: toi
    disposition: FP
    output_file: toi_blend_flags.csv
  noise_sample:
    method: tic_field_patches
    output_file: quiet_star_sample.csv
    tmag_min: 8.0
    tmag_max: 13.0
    patch_radius_deg: 0.12

dataset_builder:
  output_dir: data/features
  labels_file: data/labels/training_labels.csv
  min_observations: 500
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15

# Per-class target counts (MVP minimums)
class_targets:
  transit: 80
  binary: 60
  blend: 40
  starspot: 60
  noise: 80
