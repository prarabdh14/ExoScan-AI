# XGBoost classification settings — implemented in Phase 7

model:
  type: xgboost
  artifact_path: models/xgboost/classifier.joblib
  metadata_path: models/xgboost/metadata.json

xgboost:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  objective: multi:softprob
  eval_metric: mlogloss
  use_label_encoder: false
  random_state: 42

training:
  class_weight: balanced
  early_stopping_rounds: 20
  cv_folds: 5

calibration:
  enabled: true
  method: isotonic
  artifact_path: models/xgboost/calibrator.joblib

classes:
  - transit
  - binary
  - blend
  - starspot
  - noise
